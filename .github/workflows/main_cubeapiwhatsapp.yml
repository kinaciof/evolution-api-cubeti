name: Build and deploy Node.js app to Azure Web App - cubeapiwhatsapp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build
        run: |
          npm install --legacy-peer-deps
          
          # Busca automática do arquivo schema.prisma
          PRISMA_PATH=$(find . -name "schema.prisma" -not -path "*/node_modules/*" | head -n 1)
          
          if [ -z "$PRISMA_PATH" ]; then
            echo "ERRO: Arquivo schema.prisma não foi encontrado no repositório!"
            exit 1
          fi
          
          echo "Sucesso: Arquivo Prisma encontrado em: $PRISMA_PATH"
          npx prisma generate --schema="$PRISMA_PATH"
          
          npm run build --if-present
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cubeapiwhatsapp'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_57
